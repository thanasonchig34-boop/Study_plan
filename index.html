<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Study Quest — Lo-fi Study Planner</title>

  <link href="https://fonts.googleapis.com/css2?family=Mali:wght@500;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="wrap">

  <!-- Header -->
  <header>
    <h1><span class="moon">🌙</span> Study Quest</h1>
    <p class="sub">
      วางแผนอ่านหนังสือ เก็บ EXP แลกรางวัล — everything can start by yourself !!
    </p>
  </header>

  <!-- Main Layout -->
  <div class="grid">

    <!-- Left Panel -->
    <aside>

      <!-- Profile -->
      <div class="card">
        <h2><span>🎧</span>Profile</h2>

        <div class="avatar">📚</div>

        <div class="stat">
          <span>Level</span>
          <b id="pLevel">1</b>
        </div>

        <div class="stat">
          <span>EXP สะสมทั้งหมด</span>
          <b id="pTotal">0</b>
        </div>

        <div class="stat">
          <span>EXP ใช้ได้</span>
          <b id="pAvail">0</b>
        </div>

        <div class="xpbar">
          <div class="xpfill" id="xpFill"></div>
        </div>

        <div class="xplabel" id="xpLabel">
          0 / 100 สู่เลเวลถัดไป
        </div>
      </div>

      <!-- Reward Shop -->
      <div class="card">
        <h2><span>🛒</span>Reward Shop</h2>
        <div id="shop"></div>
      </div>

    </aside>

    <!-- Right Panel -->
    <main>

      <!-- Add Task -->
      <div class="card">
        ...
      </div>

      <!-- Task List -->
      <div class="card">
        ...
      </div>

    </main>

  </div>

</div>

<div id="toast"></div>

<script src="script.js"></script>

</body>
</html>
